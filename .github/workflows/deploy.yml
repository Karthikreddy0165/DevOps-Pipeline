name: CD Pipeline - EC2 Deploy

on:
  push:
    branches: ['main']

jobs:
  deploy:
    runs-on: ubuntu-latest
    needs: [] # Runs instantly or you could add "build-and-test" here
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            mkdir -p ~/app
            cd ~/app

            # Pull latest changes (idempotent setup)
            if [ -d ".git" ]; then
              git pull origin main
            else
              git clone ${{ github.repositoryUrl }} .
            fi

            bash scripts/deploy.sh
